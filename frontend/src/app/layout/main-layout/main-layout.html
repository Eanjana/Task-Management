<div class="layout" [class.layout--collapsed]="sidebarCollapsed()">
  <!-- ─── Sidebar ─── -->
  <aside
    class="sidebar"
    [class.sidebar--collapsed]="sidebarCollapsed()"
    role="navigation"
    aria-label="Main navigation"
  >
    <div class="sidebar__header">
      <div class="sidebar__brand">
        <img src="favicon.png" alt="Logo" class="sidebar__brand-logo" aria-hidden="true">
        @if (!sidebarCollapsed()) {
          <span class="sidebar__brand-text">Task Management</span>
        }
      </div>
      <button
        class="sidebar__toggle"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
        type="button"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          @if (sidebarCollapsed()) {
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          } @else {
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          }
        </svg>
      </button>
    </div>

    <nav class="sidebar__nav">
      <a
        class="sidebar__link"
        routerLink="/tasks"
        routerLinkActive="sidebar__link--active"
        [attr.aria-label]="sidebarCollapsed() ? 'My Tasks' : undefined"
        (click)="sidebarCollapsed() ? toggleSidebar() : null"
      >
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        </span>
        @if (!sidebarCollapsed()) {
          <span class="sidebar__link-text">My Tasks</span>
        }
      </a>
      <a
        class="sidebar__link"
        routerLink="/board"
        routerLinkActive="sidebar__link--active"
        [attr.aria-label]="sidebarCollapsed() ? 'Kanban Board' : undefined"
        (click)="sidebarCollapsed() ? toggleSidebar() : null"
      >
        <span class="sidebar__link-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </span>
        @if (!sidebarCollapsed()) {
          <span class="sidebar__link-text">Kanban Board</span>
        }
      </a>
    </nav>

  </aside>

  <!-- ─── Main Content ─── -->
  <div class="main">
    <!-- ─── Top Navbar ─── -->
    <header class="navbar" role="banner">
      <div class="navbar__left">
        <h2 class="navbar__title">Task Management</h2>
      </div>

      <div class="navbar__right">
        <button
          class="theme-toggle"
          (click)="themeService.toggle()"
          [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
          [attr.aria-pressed]="themeService.theme() === 'dark'"
          type="button"
        >
          @if (themeService.theme() === 'dark') {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          } @else {
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          }
        </button>

        <div class="navbar__user" (click)="toggleProfileDropdown($event)">
          <div class="navbar__user-avatar" role="button" aria-haspopup="menu" [attr.aria-expanded]="showProfileDropdown()">
            {{ getUserInitials() }}
          </div>
          
          @if (showProfileDropdown()) {
            <div class="navbar__dropdown" role="menu">
              <div class="navbar__dropdown-header">
                <span class="navbar__dropdown-name">{{ authService.currentUser()?.username }}</span>
                <span class="navbar__dropdown-email">{{ authService.currentUser()?.email }}</span>
              </div>
              <button
                class="navbar__dropdown-item"
                (click)="authService.logout()"
                role="menuitem"
                type="button"
              >
                <span class="navbar__dropdown-icon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </span>
                Logout
              </button>
            </div>
          }
        </div>
      </div>
    </header>

    <app-action-bar />

    <!-- ─── Content Area ─── -->
    <main class="content" role="main" aria-live="polite">
      <router-outlet />
    </main>
  </div>
</div>
